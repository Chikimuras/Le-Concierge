<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Le Concierge</title>
    <script>
      // Apply the persisted theme before Vue boots, to avoid a flash of the
      // wrong color scheme. Must stay minimal and inline (no external JS).
      ;(function () {
        try {
          var stored = localStorage.getItem('le-concierge.theme')
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          var resolved = stored === 'dark' || stored === 'light' ? stored : prefersDark ? 'dark' : 'light'
          if (resolved === 'dark') document.documentElement.classList.add('dark')
        } catch (_) {}
      })()
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
