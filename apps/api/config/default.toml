# Default configuration for the `api` binary.
#
# Every value here can be overridden by:
#   1. A file pointed to by APP_CONFIG_FILE
#   2. Environment variables prefixed with APP_ (nested via `__`)
#
# Keep secrets (DB URL, pepper, API keys) OUT of this file. They belong in
# env vars / Docker secrets — see CLAUDE.md §3.3 and ADR 0002.

[http]
bind = "127.0.0.1:3000"
request_timeout_secs = 30
public_base_url = "http://localhost:3000"

[database]
# Matches the dev compose stack (see infra/docker/.env.example). Overridden
# in every non-trivial env via APP_DATABASE__URL. The pool is lazy, so an
# unreachable DB does not prevent /healthz from responding.
url = "postgres://le_concierge:dev_password_change_me@127.0.0.1:5432/le_concierge_dev"
max_connections = 10
min_connections = 0
statement_timeout_secs = 5

[telemetry]
# Dev uses pretty multi-line logs. Prod must set APP_TELEMETRY__FORMAT=json.
format = "pretty"
filter = "api=debug,tower_http=info,sqlx=warn,warn"
service_name = "api"

[cors]
# Empty = CORS off. Populate in each environment (dev adds the Vite URL,
# prod adds the real domain(s)).
allowed_origins = []

# The `[auth]` section is intentionally omitted from the TOML baseline:
# both `auth.pepper` (password hashing pepper) and `auth.totp_key` (AES-256
# key wrapping TOTP secrets at rest) are secrets (CLAUDE.md §3.1, ADR 0005
# / 0007) and must be supplied via `APP_AUTH__PEPPER` / `APP_AUTH__TOTP_KEY`
# env vars (or Docker secrets in prod). Missing values make `Config::load()`
# fail closed, which is the desired default.

[session]
idle_ttl_secs = 604800        # 7 days — the idle cut-off
absolute_ttl_secs = 2592000   # 30 days — the hard cap
# Dev overrides to `false` so cookies flow over plain HTTP. In prod, HTTPS
# is mandatory (CLAUDE.md §3.2) — override via APP_SESSION__COOKIE_SECURE=true.
cookie_secure = false
# cookie_domain = "leconcierge.fr"  # leave unset to pin to origin

[redis]
# Matches the compose stack default. Override via APP_REDIS__URL in prod.
url = "redis://127.0.0.1:6379/"
